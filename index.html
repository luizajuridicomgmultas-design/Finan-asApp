        const manifest = {
            name: "Marmita Fácil",
            short_name: "Marmitas",
            start_url: location.href,
            display: "standalone",
            background_color: "#3ba571",
            theme_color: "#3ba571",

                src: "icone.png", // Usa a sua imagem salva como icone.png
                sizes: "192x192 512x512",
                type: "image/png",
                purpose: "any maskable"
            }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = URL.createObjectURL(manifestBlob);
        document.head.appendChild(link);
    </script>

        const PlannerScreen = ({ navigateTo, updateBatchData, ingredientsDb, setIngredientsDb, recipesDb }) => {
            const [mealsCount, setMealsCount] = useState(10);
            const [selections, setSelections] = useState({ carb: [], protein: [], veggie: [], extra: [] });
            const [variationsPreview, setVariationsPreview] = useState([]);

            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [addCategory, setAddCategory] = useState('carb');
            const [newIng, setNewIng] = useState({ name: '', costPerKg: '', calPer100g: '', proPer100g: '', carbPer100g: '' });
            const [ingToDelete, setIngToDelete] = useState(null);

            const handleSelect = (category, id) => {
                setSelections(prev => {
                    const currentList = prev[category];
                    if (currentList.includes(id)) {
                        return { ...prev, [category]: currentList.filter(i => i !== id) };
                    } else {
                        return { ...prev, [category]: [...currentList, id] };
                    }
                });
            };

            useEffect(() => {
                const keys = ['carb', 'protein', 'veggie', 'extra'].filter(k => selections[k].length > 0);
                if (keys.length === 0) {
                    setVariationsPreview([]);
                    return;
                }

                let combinations = [{}];
                for (const key of keys) {
                    const nextCombinations = [];
                    for (const combo of combinations) {
                        for (const id of selections[key]) {
                            nextCombinations.push({ ...combo, [key]: id });
                        }
                    }
                    combinations = nextCombinations;
                }

                const maxVariations = Math.max(1, Math.floor(mealsCount / 3));
                const targetCombosCount = Math.min(combinations.length, maxVariations);
                
                const selectedCombinations = [];
                if (targetCombosCount === combinations.length) {
                    selectedCombinations.push(...combinations);
                } else {
                    const step = combinations.length / targetCombosCount;
                    for (let i = 0; i < targetCombosCount; i++) {
                        selectedCombinations.push(combinations[Math.floor(i * step)]);
                    }
                }

                const baseCount = Math.floor(mealsCount / targetCombosCount);
                let remainder = mealsCount % targetCombosCount;

                const weights = { carb: 35, protein: 35, veggie: 20, extra: 10 }; 
                const totalActiveWeight = keys.reduce((sum, cat) => sum + weights[cat], 0);

                const finalVariations = selectedCombinations.map((combo, index) => {
                    let count = baseCount + (index < remainder ? 1 : 0);
                    if (count === 0) return null; 

                    let items = [];
                    let totalCost = 0, totalCal = 0, totalPro = 0, totalCarb = 0;
                    let primaryProtein = '';
                    let primaryCarb = '';

                    keys.forEach(cat => {
                        let item = ingredientsDb[cat].find(i => i.id === combo[cat]);
                        if (!item) return;

                        if(cat === 'protein') primaryProtein = item.name;
                        if(cat === 'carb') primaryCarb = item.name;

                        let itemWeightGrams = Math.round((weights[cat] / totalActiveWeight) * 500);
                        let cost = (itemWeightGrams / 1000) * item.costPerKg;
                        let cals = (itemWeightGrams / 100) * item.calPer100g;
                        let pro = (itemWeightGrams / 100) * item.proPer100g;
                        let carb = (itemWeightGrams / 100) * item.carbPer100g;

                        items.push({ id: item.id, category: cat, name: item.name, weight: itemWeightGrams, cost });
                        totalCost += cost;
                        totalCal += cals;
                        totalPro += pro;
                        totalCarb += carb;
                    });

                    let currentWeightSum = items.reduce((sum, item) => sum + item.weight, 0);
                    if (currentWeightSum !== 500 && items.length > 0) {
                        let diff = 500 - currentWeightSum;
                        items[0].weight += diff; 
                    }

        const RecipesScreen = ({ recipesDb, setRecipesDb }) => {
            const [isAddOpen, setIsAddOpen] = useState(false);
            const [selectedRecipe, setSelectedRecipe] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [recipeToDelete, setRecipeToDelete] = useState(null);

            const [newRecipe, setNewRecipe] = useState({ 
                title: '', ingredients: '', instructions: '', 
                yield: '', time: '', cost: '', calories: '', 
                tags: '', freezable: true, videoLink: '' 
            });

            const toggleFavorite = (id) => {
                setRecipesDb(recipesDb.map(r => r.id === id ? { ...r, isFavorite: !r.isFavorite } : r));
            };

            const saveNewRecipe = () => {
                if(!newRecipe.title) return;
                const recipe = {
                    id: editingId ? editingId : Date.now(),
                    title: newRecipe.title,
                    ingredients: newRecipe.ingredients,
                    instructions: newRecipe.instructions,
                    yield: newRecipe.yield || 'N/A',
                    time: newRecipe.time || 'N/A',
                    cost: parseFloat(newRecipe.cost) || 0,
                    calories: parseInt(newRecipe.calories) || 0,
                    freezable: newRecipe.freezable,
                    videoLink: newRecipe.videoLink,
                    img: 'https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&q=80&w=400&h=300',
                    tags: typeof newRecipe.tags === 'string' ? newRecipe.tags.split(',').map(t => t.trim()).filter(t => t) : newRecipe.tags,
                    isFavorite: false
                };
                if (recipe.freezable && !recipe.tags.includes('Congelável')) recipe.tags.push('Congelável');

                if (editingId) {
                    setRecipesDb(recipesDb.map(r => r.id === editingId ? { ...recipe, isFavorite: r.isFavorite, img: r.img } : r));
                    setEditingId(null);
                } else {
                    setRecipesDb([recipe, ...recipesDb]);
                }
                
                setIsAddOpen(false);
                setNewRecipe({ title: '', ingredients: '', instructions: '', yield: '', time: '', cost: '', calories: '', tags: '', freezable: true, videoLink: '' });
            };

            const filteredRecipes = recipesDb.filter(r => 
                r.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
                r.tags.some(t => t.toLowerCase().includes(searchTerm.toLowerCase()))
            );

            return (
                <div className="pb-24 animate-slide-up">
                    <div className="px-6 pt-8 pb-4 bg-white sticky top-0 z-10 border-b border-slate-100">
                        <div className="flex justify-between items-center mb-4">
                            <div>
                                <h1 className="text-2xl font-bold text-slate-800">Receitas Base</h1>
                                <p className="text-slate-500 text-sm mt-1">Sua biblioteca de preparos.</p>
                            </div>
                            <button onClick={() => { setEditingId(null); setNewRecipe({ title: '', ingredients: '', instructions: '', yield: '', time: '', cost: '', calories: '', tags: '', freezable: true, videoLink: '' }); setIsAddOpen(true); }} className="w-10 h-10 bg-brand-50 rounded-full flex items-center justify-center text-brand-600 hover:bg-brand-100 transition-colors shadow-sm shrink-0">
                                <Icon name="plus" size={20} />
                            </button>
                        </div>
                        <InputField placeholder="Buscar receitas ou tags..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} prefix={<Icon name="search" size={18} />} />
                    </div>

                    <div className="p-6 space-y-6">
                        {filteredRecipes.map(recipe => (
                            <Card key={recipe.id} onClick={() => setSelectedRecipe(recipe)} className="p-0 overflow-hidden group cursor-pointer border-none shadow-[0_8px_30px_rgb(0,0,0,0.04)] hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)] relative">
                                <button 
                                    onClick={(e) => { e.stopPropagation(); toggleFavorite(recipe.id); }}
                                    className="absolute top-3 right-3 w-9 h-9 bg-white/80 backdrop-blur-md rounded-full flex items-center justify-center text-amber-500 shadow-sm z-10 hover:scale-110 transition-transform"
                                >
                                    <Icon name="star" size={18} className={recipe.isFavorite ? "fill-current-svg" : ""} />
                                </button>

                                <div className="h-40 w-full relative overflow-hidden">
                                    <img src={recipe.img} alt={recipe.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                                    <div className="absolute bottom-3 left-4 flex flex-wrap gap-2 pr-4">
                                        {recipe.tags.map(tag => (
                                            <span key={tag} className="bg-white/20 backdrop-blur-md text-white text-[10px] font-bold px-2 py-1 rounded-md uppercase tracking-wide">
                                                {tag}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                                <div className="p-5">
                                    <h3 className="font-bold text-lg text-slate-800 mb-3 leading-tight pr-8">{recipe.title}</h3>
                                    <div className="flex items-center gap-4 text-sm text-slate-500 font-medium">
                                        <div className="flex items-center gap-1"><Icon name="clock" size={14} /> {recipe.time}</div>
                                        <div className="flex items-center gap-1 text-brand-600"><Icon name="banknote" size={14} /> R$ {typeof recipe.cost === 'number' ? recipe.cost.toFixed(2) : recipe.cost}</div>
                                    </div>
                                </div>
                            </Card>
                        ))}
                    </div>

                    <Modal isOpen={isAddOpen} onClose={() => setIsAddOpen(false)} title="Nova Receita">
                        <div className="space-y-1">
                            <InputField label="Nome da Receita" placeholder="Ex: Frango ao Curry" value={newRecipe.title} onChange={(e) => setNewRecipe({...newRecipe, title: e.target.value})} />
                            
                            <InputField label="Ingredientes" placeholder="Liste os ingredientes e quantidades..." multiline value={newRecipe.ingredients} onChange={(e) => setNewRecipe({...newRecipe, ingredients: e.target.value})} />
                            <InputField label="Modo de Preparo" placeholder="Passo a passo do preparo..." multiline value={newRecipe.instructions} onChange={(e) => setNewRecipe({...newRecipe, instructions: e.target.value})} />
                            
                            <div className="grid grid-cols-2 gap-4">
                                <InputField label="Rendimento" placeholder="Ex: 5 porções" value={newRecipe.yield} onChange={(e) => setNewRecipe({...newRecipe, yield: e.target.value})} />
                                <InputField label="Tempo (min)" placeholder="40 min" value={newRecipe.time} onChange={(e) => setNewRecipe({...newRecipe, time: e.target.value})} />
                                <InputField label="Custo Est." placeholder="0.00" type="number" prefix="R$" value={newRecipe.cost} onChange={(e) => setNewRecipe({...newRecipe, cost: e.target.value})} />
                                <InputField label="Calorias Est." placeholder="350" type="number" prefix="kcal" value={newRecipe.calories} onChange={(e) => setNewRecipe({...newRecipe, calories: e.target.value})} />
                            </div>

                            <div className="flex items-center gap-3 mb-4 p-3 bg-slate-50 rounded-xl border border-slate-200">
                                <input type="checkbox" id="congelavel" checked={newRecipe.freezable} onChange={(e) => setNewRecipe({...newRecipe, freezable: e.target.checked})} className="w-5 h-5 accent-brand-600 rounded" />
                                <label htmlFor="congelavel" className="text-sm font-semibold text-slate-700">Esta receita é congelável</label>
                            </div>

                            <InputField label="Tags (separadas por vírgula)" placeholder="Low Carb, Barata..." value={newRecipe.tags} onChange={(e) => setNewRecipe({...newRecipe, tags: e.target.value})} />
                            
                            <InputField label="Link do Vídeo (Opcional)" placeholder="https://youtube.com/..." type="url" value={newRecipe.videoLink} onChange={(e) => setNewRecipe({...newRecipe, videoLink: e.target.value})} />
                            
                            <Button onClick={saveNewRecipe} full className="mt-6">Adicionar Receita</Button>
                        </div>
                    </Modal>

                    {selectedRecipe && (
                        <Modal isOpen={!!selectedRecipe} onClose={() => setSelectedRecipe(null)} title="Detalhes da Receita">
                            <div className="space-y-6">
                                <div>
                                    <h3 className="text-2xl font-bold text-slate-800 leading-tight">{selectedRecipe.title}</h3>
                                    <div className="flex flex-wrap gap-2 mt-2">
                                        {selectedRecipe.freezable && <Badge variant="green"><Icon name="snowflake" size={12} className="inline mr-1" /> Congelável</Badge>}
                                        <Badge variant="gray">{selectedRecipe.yield}</Badge>
                                    </div>
                                </div>

                                <div className="grid grid-cols-3 gap-2 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                    <div className="text-center">
                                        <Icon name="clock" size={20} className="text-slate-400 mx-auto mb-1" />
                                        <p className="text-xs font-semibold text-slate-700">{selectedRecipe.time}</p>
                                    </div>
                                    <div className="text-center border-l border-r border-slate-200">
                                        <Icon name="banknote" size={20} className="text-brand-500 mx-auto mb-1" />
                                        <p className="text-xs font-semibold text-slate-700">R$ {typeof selectedRecipe.cost === 'number' ? selectedRecipe.cost.toFixed(2) : selectedRecipe.cost}</p>
                                    </div>
                                    <div className="text-center">
                                        <Icon name="flame" size={20} className="text-orange-400 mx-auto mb-1" />
                                        <p className="text-xs font-semibold text-slate-700">{selectedRecipe.calories} kcal</p>
                                    </div>
                                </div>

                                <div>
                                    <h4 className="font-bold text-slate-800 flex items-center gap-2 mb-2"><Icon name="shopping-bag" size={18} className="text-brand-600"/> Ingredientes</h4>
                                    <p className="text-sm text-slate-600 whitespace-pre-line bg-white border border-slate-100 p-4 rounded-xl leading-relaxed">
                                        {selectedRecipe.ingredients || "Ingredientes não especificados."}
                                    </p>
                                </div>

                                <div>
                                    <h4 className="font-bold text-slate-800 flex items-center gap-2 mb-2"><Icon name="chef-hat" size={18} className="text-brand-600"/> Modo de Preparo</h4>
                                    <p className="text-sm text-slate-600 whitespace-pre-line bg-white border border-slate-100 p-4 rounded-xl leading-relaxed">
                                        {selectedRecipe.instructions || "Modo de preparo não especificado."}
                                    </p>
                                </div>

                                {selectedRecipe.videoLink && (
                                    <a href={selectedRecipe.videoLink} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-2 w-full py-3 bg-red-50 text-red-600 rounded-xl font-semibold border border-red-100 hover:bg-red-100 transition-colors active:scale-95">
                                        <Icon name="youtube" size={18} /> Assistir Vídeo da Receita
                                    </a>
                                )}

                                <div className="flex gap-3 mt-6 pt-6 border-t border-slate-100">
                                    <Button variant="outline" className="flex-1 text-slate-500 border-slate-200" onClick={() => setRecipeToDelete(selectedRecipe.id)}>
                                        <Icon name="trash-2" size={18} /> Excluir
                                    </Button>
                                    <Button variant="secondary" className="flex-1" onClick={() => {
                                        setEditingId(selectedRecipe.id);
                                        setNewRecipe({...selectedRecipe, tags: selectedRecipe.tags.join(', ')});
                                        setSelectedRecipe(null);
                                        setIsAddOpen(true);
                                    }}>
                                        <Icon name="edit-3" size={18} /> Editar
                                    </Button>
                                </div>
                            </div>
                        </Modal>
                    )}

                    <Modal isOpen={!!recipeToDelete} onClose={() => setRecipeToDelete(null)} title="Excluir Receita">
                        <p className="text-slate-600 mb-6">Tem certeza que deseja excluir esta receita permanentemente?</p>
                        <div className="flex gap-3">
                            <Button variant="ghost" className="flex-1" onClick={() => setRecipeToDelete(null)}>Cancelar</Button>
                            <Button variant="primary" className="flex-1 bg-red-500 hover:bg-red-600 shadow-red-500/20" onClick={() => {
                                setRecipesDb(prev => prev.filter(r => r.id !== recipeToDelete));
                                setRecipeToDelete(null);
                                setSelectedRecipe(null);
                            }}>Excluir</Button>
                        </div>
                    </Modal>
                </div>
            );
        };

        const App = () => {
            const [showSplash, setShowSplash] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [ingredientsDb, setIngredientsDb] = useState(() => {
                const saved = localStorage.getItem('mf_ingredients');
                return saved ? JSON.parse(saved) : INITIAL_INGREDIENTS_DB;
            });
            const [recipesDb, setRecipesDb] = useState(() => {
                const saved = localStorage.getItem('mf_recipes');
                return saved ? JSON.parse(saved) : INITIAL_RECIPES_DB;
            });
            const [batchData, setBatchData] = useState(() => {
                const saved = localStorage.getItem('mf_batch');
                return saved ? JSON.parse(saved) : null;
            });
            const [batchHistory, setBatchHistory] = useState(() => {
                const saved = localStorage.getItem('mf_batchHistory');
                return saved ? JSON.parse(saved) : [];
            });

            // Lógica para esconder a Splash Screen
            useEffect(() => {
                const timer = setTimeout(() => setShowSplash(false), 2500);
                return () => clearTimeout(timer);
            }, []);

            // Salvamento Automático
            useEffect(() => { localStorage.setItem('mf_ingredients', JSON.stringify(ingredientsDb)); }, [ingredientsDb]);
            useEffect(() => { localStorage.setItem('mf_recipes', JSON.stringify(recipesDb)); }, [recipesDb]);
            useEffect(() => { localStorage.setItem('mf_batch', JSON.stringify(batchData)); }, [batchData]);
            useEffect(() => { localStorage.setItem('mf_batchHistory', JSON.stringify(batchHistory)); }, [batchHistory]);

            const updateBatchData = (data) => {
                setBatchData(data);
            };

            const archiveBatch = (data) => {
                setBatchHistory([data, ...batchHistory]);
                setBatchData(null); // Limpa o lote atual ao arquivar
            };

            const NavItem = ({ id, icon, label }) => {
                const isActive = activeTab === id;
                return (
                    <button 
                        onClick={() => setActiveTab(id)}
                        className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-all duration-300 ${isActive ? 'text-brand-600 scale-110' : 'text-slate-400 hover:text-slate-600'}`}
                    >
                        <div className={`relative ${isActive ? 'drop-shadow-md' : ''}`}>
                            <Icon name={icon} size={22} className={isActive ? 'fill-brand-50' : ''} />
                            {isActive && <div className="absolute -bottom-3 left-1/2 -translate-x-1/2 w-1 h-1 bg-brand-600 rounded-full"></div>}
                        </div>
                        <span className={`text-[10px] font-semibold ${isActive ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>{label}</span>
                    </button>
                );
            };

            return (
                <div className="min-h-screen relative max-w-md mx-auto bg-[#f8fafc] shadow-2xl overflow-hidden flex flex-col">
                    
                    {showSplash && <SplashScreen />}

                    <div className="flex-1 overflow-y-auto overflow-x-hidden">
                        {activeTab === 'dashboard' && <DashboardScreen navigateTo={setActiveTab} batchData={batchData} batchHistory={batchHistory} />}
                        {activeTab === 'planner' && <PlannerScreen navigateTo={setActiveTab} updateBatchData={updateBatchData} ingredientsDb={ingredientsDb} setIngredientsDb={setIngredientsDb} recipesDb={recipesDb} />}
                        {activeTab === 'batch' && <BatchScreen batchData={batchData} archiveBatch={archiveBatch} navigateTo={setActiveTab} />}
                        {activeTab === 'ai' && <AIScreen navigateTo={setActiveTab} updateBatchData={updateBatchData} recipesDb={recipesDb} ingredientsDb={ingredientsDb} />}
                        {activeTab === 'recipes' && <RecipesScreen recipesDb={recipesDb} setRecipesDb={setRecipesDb} />}
                    </div>

                    <div className="fixed bottom-0 w-full max-w-md bg-white border-t border-slate-100 h-16 pb-safe pt-1 z-50 flex justify-around items-center px-2 pb-safe-area shadow-[0_-10px_40px_-10px_rgba(0,0,0,0.05)]">
                        <NavItem id="dashboard" icon="layout-dashboard" label="Resumo" />
                        <NavItem id="planner" icon="calendar-plus" label="Planejar" />
                        <div className="relative -top-5">
                            <button 
                                onClick={() => setActiveTab('ai')}
                                className={`w-14 h-14 rounded-full flex items-center justify-center text-white shadow-lg transition-transform active:scale-95 ${activeTab === 'ai' ? 'bg-slate-800 shadow-slate-800/30 scale-105' : 'bg-brand-500 shadow-brand-500/30'}`}
                            >
                                <Icon name="sparkles" size={24} className="fill-white/20" />
                            </button>
                        </div>
                        <NavItem id="batch" icon="package-open" label="Meu Lote" />
                        <NavItem id="recipes" icon="chef-hat" label="Receitas" />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
